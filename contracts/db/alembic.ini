# Alembic config для C2-схемы EKCELO (contracts/db).
# Целевые СУБД: SQLite (локально) и PostgreSQL (масштаб). URL задаётся через
# переменную окружения EKCELO_DB_URL (по умолчанию — локальный SQLite-файл).
[alembic]
script_location = %(here)s/migrations
prepend_sys_path = %(here)s/../..
path_separator = os
sqlalchemy.url = sqlite:///%(here)s/ekcelo.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
