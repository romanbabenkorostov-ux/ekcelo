# ШАБЛОН: ручные правки экономиста по объекту (ЭТП-профиль §6).
# Эти данные имеют ВЫСШИЙ приоритет — система не затрёт их данными из NSPD/реестров.
# Заполните по своим объектам. Загрузка: egrn-parser (ОСВ-загрузчик etl_osv).

default_source: manual          # manual = ваш ручной ввод (высший приоритет)
default_confidence: 0.95        # уверенность 0..1

profiles:
  - cad_number: "<00:00:0000000:000>"      # кадастровый номер объекта
    building_extra:
      wear_degree: <30>                     # износ, % (число)
      renovation_year: <2019>               # год последнего ремонта
      wall_material: "<кирпичное>"          # материал стен
    layout:
      finish_level: "<стандарт>"            # уровень отделки
      current_condition_comment: "<краткое описание состояния>"
    legal_extra:
      use_type_fact: "<фактическое использование>"
    risks:
      technical_risks: ["<риск 1>", "<риск 2>"]
      legal_risks: []
    extras:
      advantages: ["<преимущество объекта>"]
      notes: "<заметки осмотра, дата>"
# Любую секцию/поле можно опустить — заполняйте только то, что знаете.
