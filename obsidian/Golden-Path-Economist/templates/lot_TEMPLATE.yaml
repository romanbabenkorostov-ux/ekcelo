# ШАБЛОН: определение лота (что продаётся/оценивается единым объектом).
# Состав можно задать списком КН, маской квартала или по типу объекта.

lots:
  - lot_id: "<lot-0001>"                     # ID лота: буквы/цифры/_/:/-/
    name: "<Название лота>"
    deal_type: <sale>                        # sale | lease | other
    procedure_type: "<торги>"
    primary_cad_number: "<00:00:0000000:000>"   # главный объект лота
    platform_targets: [torgi.gov.ru]         # площадки ЭТП
    include:                                  # правила отбора состава:
      cads: ["<00:00:0000000:000>", "<00:00:0000000:001>"]   # явные КН
      # globs: ["00:00:0000000:*"]            # ИЛИ вся группа квартала
      # types: ["land", "building"]           # ИЛИ по типу объекта
    items:                                    # роли членов лота:
      - { cad_number: "<00:00:0000000:000>", role: land,     ord: 1 }
      - { cad_number: "<00:00:0000000:001>", role: building, ord: 2 }
# role ∈ land | building | room | equipment | structure
