# Определение лота (что продаём/оцениваем единым объектом).
# Состав лота отбирается из БД правилами include/exclude — вручную перечислять
# каждый КН не обязательно (можно по маске квартала или по типу объекта).

lots:
  - lot_id: "lot-vineyard-001"
    name: "Винодельческое хозяйство (земля + винодельня)"
    deal_type: sale
    procedure_type: "торги"
    primary_cad_number: "23:15:0804000:66"
    platform_targets: [torgi.gov.ru, sberbank-ast.ru]
    # Отбор состава:
    include:
      cads: ["23:15:0804000:66", "23:15:0804000:200"]  # ЕЗП-виноградники + винодельня
      # globs: ["23:15:0804000:*"]                       # или вся группа квартала
      # types: ["land", "building"]                      # или по типу
    items:
      - { cad_number: "23:15:0804000:66",  role: land,     ord: 1 }
      - { cad_number: "23:15:0804000:200", role: building, ord: 2 }
