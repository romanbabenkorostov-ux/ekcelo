<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Ekcelo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<style>
  html, body { margin: 0; padding: 0; background: #fafafa; color: #222;
    font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  main { max-width: 520px; margin: 18vh auto 0; padding: 24px; text-align: center; }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 8px; color: #444; }
  p  { margin: 0; color: #666; }
  #err { display: none; margin-top: 14px; padding: 12px 14px;
    background: #fff3f3; border: 1px solid #f5c6c6; border-radius: 8px;
    color: #8a1f1f; text-align: left; }
</style>
</head>
<body>
<main>
  <h1>Переход…</h1>
  <p id="status">Открываю ссылку.</p>
  <div id="err"></div>
</main>
<script type="module">
  import { parseShortUrl } from "https://romanbabenkorostov-ux.github.io/ekcelo/tokens.js";

  function showError(msg) {
    document.getElementById("status").style.display = "none";
    const el = document.getElementById("err");
    el.textContent = msg;
    el.style.display = "block";
  }

  const target = parseShortUrl(location.href);
  if (target) {
    location.replace(target);
  } else {
    const hasToken = new URL(location.href).searchParams.has("t");
    showError(hasToken
      ? "Ссылка повреждена или недопустима."
      : "В адресе нет параметра ?t=…");
  }
</script>
</body>
</html>
