<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Ekcelo · admin · encode</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<style>
  html, body { margin: 0; padding: 0; background: #fafafa; color: #222;
    font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  main { max-width: 640px; margin: 5vh auto; padding: 20px; }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 16px; }
  label { display: block; margin: 14px 0 6px; color: #555; font-size: 13px; }
  input, textarea { width: 100%; box-sizing: border-box; padding: 10px 12px;
    border: 1px solid #d0d0d0; border-radius: 8px; font: inherit; background: #fff; }
  textarea { min-height: 72px; resize: vertical; word-break: break-all; }
  button { margin-top: 12px; padding: 10px 18px; border: 0; border-radius: 8px;
    background: #2a6df4; color: #fff; font: inherit; cursor: pointer; }
  button.copy { background: #eee; color: #333; margin-left: 8px; padding: 6px 12px; font-size: 13px; }
  .err { color: #8a1f1f; margin-top: 10px; min-height: 1.2em; }
  .out { display: none; margin-top: 18px; padding: 14px; background: #f4f7ff;
    border: 1px solid #d6e0fb; border-radius: 8px; }
  .row { display: flex; align-items: center; gap: 8px; }
  small { color: #888; }
</style>
</head>
<body>
<main>
  <h1>Encode URL → короткая ссылка</h1>

  <label for="src">Целевой URL (http/https)</label>
  <input id="src" type="url" placeholder="https://disk.yandex.ru/d/…" autocomplete="off" spellcheck="false">

  <label for="base">База короткой ссылки</label>
  <input id="base" type="url" value="https://ekcelo.ru/" autocomplete="off" spellcheck="false">

  <button id="go">Сгенерировать</button>
  <div id="err" class="err"></div>

  <div id="out" class="out">
    <label>Токен <small>(<span id="tlen"></span> симв.)</small></label>
    <textarea id="token" readonly></textarea>
    <div class="row"><button class="copy" data-target="token">copy</button></div>

    <label>Короткая ссылка</label>
    <textarea id="short" readonly></textarea>
    <div class="row"><button class="copy" data-target="short">copy</button></div>
  </div>
</main>

<script type="module">
  import { encode, buildShortUrl } from "./tokens.js";

  const $ = (id) => document.getElementById(id);

  function run() {
    const url = $("src").value.trim();
    const base = $("base").value.trim() || undefined;
    $("err").textContent = "";
    try {
      const tok = encode(url);
      const short = buildShortUrl(url, base);
      $("token").value = tok;
      $("short").value = short;
      $("tlen").textContent = tok.length;
      $("out").style.display = "block";
    } catch (e) {
      $("out").style.display = "none";
      $("err").textContent = "Недопустимый URL: нужен http:// или https://.";
    }
  }

  $("go").addEventListener("click", run);
  $("src").addEventListener("keydown", (e) => { if (e.key === "Enter") run(); });

  for (const b of document.querySelectorAll("button.copy")) {
    b.addEventListener("click", async () => {
      const t = document.getElementById(b.dataset.target);
      t.select();
      await navigator.clipboard.writeText(t.value);
      b.textContent = "copied";
      setTimeout(() => (b.textContent = "copy"), 1200);
    });
  }
</script>
</body>
</html>
