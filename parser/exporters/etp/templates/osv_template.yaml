# OSV survey-лист — шаблон для экономиста.
# Импорт: python -m parser.exporters.etp.etl_osv_cli --yaml <этот файл> --db <ekcelo.sqlite>
# Контракт: parser/exporters/etp/etl_osv.py + obsidian/Architecture/etl-osv.md.

schema_version: "1.0"

# Источник по умолчанию для записей без явного `source`.
# Допустимые: osv | exif | manual | nspd | llm.
default_source: osv
default_confidence: 1.0

# ─────────────────────────────────────────────────────────────────────────────
# Профили объектов. Заполняются по тем КН, у которых есть гэп-данные
# (отделка, инженерка, риски и т.п.). Если у КН нет данных для ЭТП —
# просто не упоминайте его здесь.
# ─────────────────────────────────────────────────────────────────────────────
profiles:
  - cad_number: "61:44:0050706:31"
    # source: osv      # необязательно; default_source применяется
    # confidence: 1.0  # необязательно; default_confidence применяется

    location_extra:
      landmark: "в 7 минутах пешком от станции метро «Тверская»"
      transport_access: "удовлетворительная"
      environment_short: "зона смешанной жилой и деловой застройки центральной части города"

    building_extra:
      renovation_year: 2015
      wear_degree: "удовлетворительное"
      engineering:
        electricity: "подключено"
        water: "центральное"
        sewerage: "центральная"
        heating: "центральное"
        gas: "отсутствует"
        telecom: "интернет, телефония"
      amenities:
        - "благоустроенная придомовая территория"
        - "организованные парковочные места"

    layout:
      layout_type: "кабинетная"
      ceiling_height_m: 3.1
      finish_level: "офисная отделка"
      finish_state: "удовлетворительное"
      windows: "пластиковые стеклопакеты"
      entry_group: "отдельный вход с улицы"
      current_condition_comment: "требуется частичный косметический ремонт"

    legal_extra:
      use_type_fact: "офис"
      zoning: "общественно-деловая зона"
      special_restrictions:
        - "запрещено размещение шумных производств"

    risks:
      technical_risks:
        - "отдельные элементы отделки требуют обновления"
      legal_risks: []
      location_risks:
        - "ограниченные возможности парковки в дневное время"
      other_risks: []

    extras:
      furniture: "частично меблировано"
      advantages:
        - "расположение в деловом центре города"
        - "пешая доступность до метро"
      notes: "Подробные сведения приведены в отчёте об оценке и технической документации."

# ─────────────────────────────────────────────────────────────────────────────
# Лоты — группировка КН для экспорта.
# ─────────────────────────────────────────────────────────────────────────────
lots:
  - lot_id: "lot:pirushin:001"   # шаблон: lot:<project_slug>:<NNN>
    name: "Имущественный комплекс «Пирушин-Центр»: офис + участок"
    platform_targets:
      - torgi.gov.ru
      - sberbank-ast.ru
    procedure_type: "реализации имущества должника в рамках дела о банкротстве"
    deal_type: sale              # sale | lease | other | null
    primary_cad_number: "61:44:0050706:31"
    notes_md: "Лот сформирован по решению экономиста: офис + смежный участок продаются единым активом."
    items:
      - { cad_number: "61:44:0050706:31", role: room, ord: 1 }
      - { cad_number: "61:44:0050706:7",  role: land, ord: 2 }
