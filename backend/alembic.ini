# Alembic stub configuration.
#
# Этот файл — placeholder под будущую миграцию на SQLModel + Alembic
# (см. ADR-003 тема 4, deferred до пользовательского решения о
# adoption). Сейчас ekcelo использует sqlite3-direct + ручные миграции
# в `schema/migrations/`.
#
# Чтобы активировать runtime Alembic:
# 1. `pip install alembic sqlmodel`
# 2. `alembic init --template generic backend/alembic` (или подменить env.py)
# 3. Настроить sqlalchemy.url ниже + создать первую миграцию.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///./ekcelo.sqlite

# Логирование (минимальное)
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
